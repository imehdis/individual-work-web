<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductPreviewCard</title>
    <style>
        .image img {
            width: 200px;
            height: auto;
        }
        .description h2 {
            font-size: 1.2em;
            color: #8D8D8D;
        }
        .description h1 {
            font-size: 2em;
            margin-bottom: 0.5em;
        }
        .description p {
            font-size: 1.1em;
            color: #555;
        }
        .button button {
            background-color: #2D3748;
            color: white;
            border: none;
            padding: 0.8em 1.5em;
            font-size: 1.1em;
            cursor: pointer;
        }
        .old-price {
            text-decoration: line-through;
            color: #8D8D8D;
        }
        .new-price {
            color: #3fbd5a;
            font-weight: bold;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="image">
        <img src="https://images.unsplash.com/photo-1503602642458-232111445657?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cHJvZHVjdHxlbnwwfHwwfHx8MA%3D%3D&auto=format&fit=crop&w=500&q=60" alt="Product Image">
    </div>
    <div class="description">
        <h2>PERFUME</h2>
        <h1>Gabrielle Essence Eau de Parfum</h1>
        <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        <p class="old-price">$169.99</p>
        <p class="new-price">$149.99</p>
    </div>
    <div class="button">
        <button>Add to Cart</button>
    </div>
    </div>
</body>
</html>
