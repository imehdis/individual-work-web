<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProductPreviewCard</title>
    <link> rel="stylesheet" href="style.css">
</head>
<body>
    <div class="parent">
    <div class="image">
        <img src="chanelparfume.webp" alt="Perfume Image">
    </div>
    <div class="description">
        <h2>PERFUME</h2>
        <h1>Gabrielle Essence Eau de Parfum</h1>
        <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        <p class="old-price">$169.99</p>
        <p class="new-price">$149.99</p>
    </div>
    <div class="button">
        <button>Add to Cart</button>
    </div>
    </div>
</body>
</html>
