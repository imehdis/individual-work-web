<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="card">
        <div class="card-image">
            <img src="chanelparfume.webp" alt="Gabrielle Chanel Perfume">
        </div>
        <div class="content">
            <p class="category">PERFUME</p>
            <h1>Gabrielle Essence Eau De Parfum</h1>
            <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
            <div class="price-box">
                <p class="new-price">$149.99</p>
                <p class="old-price">$169.99</p>
            </div>
            <button class="button">
                <img src="icon-cart.svg" alt="cart icon" class="cart-icon">Add to Cart</button>
        </div>
    </main>
</body>
</html>
